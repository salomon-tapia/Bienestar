<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MiMarca</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts (Poppins para un look moderno) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="login-styles.css">
</head>
<body class="bg-light">

    <!-- Navbar Simplificada -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                MiMarca<span class="text-primary">.</span>
            </a>
            <div class="d-flex">
                <a href="#" class="btn btn-outline-primary btn-sm">Volver al Inicio</a>
            </div>
        </div>
    </nav>

    <!-- Sección de Login -->
    <section class="login-section d-flex align-items-center min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-5">
                    
                    <!-- Tarjeta de Login -->
                    <div class="card border-0 shadow-lg login-card">
                        <div class="card-body p-5">
                            
                            <!-- Header del Formulario -->
                            <div class="text-center mb-5">
                                <div class="login-icon mb-3">
                                    <i class="bi bi-person-circle"></i>
                                </div>
                                <h2 class="fw-bold mb-2">¡Bienvenido!</h2>
                                <p class="text-muted">Ingresa tus credenciales para continuar</p>
                            </div>

                            <!-- Formulario -->
                            <form id="loginForm" novalidate>
                                
                                <!-- Campo Email -->
                                <div class="mb-4">
                                    <label for="email" class="form-label fw-medium">
                                        <i class="bi bi-envelope me-2 text-primary"></i>Correo Electrónico
                                    </label>
                                    <div class="input-group">
                                        <input 
                                            type="email" 
                                            class="form-control form-control-lg" 
                                            id="email" 
                                            placeholder="nombre@ejemplo.com"
                                            required
                                            autocomplete="email"
                                        >
                                    </div>
                                    <div class="invalid-feedback">
                                        Por favor ingresa un correo válido.
                                    </div>
                                </div>

                                <!-- Campo Contraseña -->
                                <div class="mb-4">
                                    <label for="password" class="form-label fw-medium">
                                        <i class="bi bi-lock me-2 text-primary"></i>Contraseña
                                    </label>
                                    <div class="input-group">
                                        <input 
                                            type="password" 
                                            class="form-control form-control-lg" 
                                            id="password" 
                                            placeholder="••••••••"
                                            required
                                            autocomplete="current-password"
                                            minlength="6"
                                        >
                                        <button 
                                            class="btn btn-outline-secondary toggle-password" 
                                            type="button"
                                            id="togglePassword"
                                        >
                                            <i class="bi bi-eye"></i>
                                        </button>
                                        <div class="invalid-feedback">
                                            La contraseña debe tener al menos 6 caracteres.
                                        </div>
                                    </div>
                                </div>

                                <!-- Recordarme y Olvidé contraseña -->
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input 
                                            class="form-check-input" 
                                            type="checkbox" 
                                            id="rememberMe"
                                        >
                                        <label class="form-check-label text-muted" for="rememberMe">
                                            Recordarme
                                        </label>
                                    </div>
                                    <a href="#" class="text-primary text-decoration-none small fw-medium">
                                        ¿Olvidaste tu contraseña?
                                    </a>
                                </div>

                                <!-- Botón Login -->
                                <div class="d-grid mb-4">
                                    <button 
                                        type="submit" 
                                        class="btn btn-primary btn-lg login-btn"
                                        id="loginBtn"
                                    >
                                        <span class="btn-text">Iniciar Sesión</span>
                                        <span class="btn-loader d-none">
                                            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                                            Procesando...
                                        </span>
                                    </button>
                                </div>

                                <!-- Divider -->
                                <div class="text-center mb-4">
                                    <span class="text-muted small">o continúa con</span>
                                </div>

                                <!-- Social Login -->
                                <div class="row g-3">
                                    <div class="col-6">
                                        <button type="button" class="btn btn-outline-dark w-100 social-btn">
                                            <i class="bi bi-google me-2"></i>Google
                                        </button>
                                    </div>
                                    <div class="col-6">
                                        <button type="button" class="btn btn-outline-dark w-100 social-btn">
                                            <i class="bi bi-github me-2"></i>GitHub
                                        </button>
                                    </div>
                                </div>

                                <!-- Registro -->
                                <div class="text-center mt-4">
                                    <p class="text-muted mb-0">
                                        ¿No tienes una cuenta? 
                                        <a href="#" class="text-primary fw-medium text-decoration-none">
                                            Regístrate gratis
                                        </a>
                                    </p>
                                </div>

                            </form>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="text-center mt-4">
                        <p class="text-muted small">
                            <i class="bi bi-shield-check me-1"></i>
                            Tu información está protegida y encriptada
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JavaScript Personalizado -->
    <script src="login-script.js"></script>
</body>
</html>
