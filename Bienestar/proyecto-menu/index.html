<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Experto Minimalista</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Fuente limpia (opcional, usaremos sistema por defecto para velocidad) -->
</head>
<body>

    <!-- INICIO DEL MENÚ -->
    <header class="header" id="main-header">
        <nav class="nav container" aria-label="Navegación principal">
            
            <!-- Logo -->
            <a href="#" class="nav-logo">
                Compummunicate SC<span>.</span>
            </a>

            <!-- Botón Hamburguesa (Solo visible en móvil) -->
            <button class="nav-toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="nav-menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>

            <!-- Enlaces de Navegación -->
            <div class="nav-menu" id="nav-menu">
                <ul class="nav-list">
                    <li class="nav-item"><a href="#inicio" class="nav-link">Inicio</a></li>
                    <li class="nav-item"><a href="#servicios" class="nav-link">Servicios</a></li>
                    <li class="nav-item"><a href="#proyectos" class="nav-link">Proyectos</a></li>
                    <li class="nav-item"><a href="#contacto" class="nav-link">Login</a></li>
                </ul>
                <!-- Botón de acción (CTA) opcional 
                <a href="#cta" class="nav-cta">Empezar</a> -->
            </div>

        </nav>
    </header>
    <!-- FIN DEL MENÚ -->

    <!-- Contenido de relleno para probar el scroll -->
    <main style="padding-top: 100px; padding-left: 20px;">
        <h1>Bienvenido a mi sitio</h1>
        <p>Haz scroll hacia abajo para ver el efecto sticky...</p>
        <div style="height: 200vh;"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
